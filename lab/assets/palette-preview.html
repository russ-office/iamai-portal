<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Пульс · дизайн-код v2</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Lora:ital@1&display=swap" rel="stylesheet">
<style>
:root{--paper:#FFF1E5;--surface:#FFF8F0;--ink:#1A1815;--ink-soft:#55504A;--muted:#9B948A;
--line:#E8DCCD;--accent:#E2552F;--deep:#33302B;
--ok:#7C8F62;--warn:#C8912F;--bad:#E2552F;--none:#C9C2B6;
--fu:Manrope,sans-serif;--fm:"JetBrains Mono",ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fu);background:var(--paper);color:var(--ink);padding:48px clamp(16px,4vw,56px) 90px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto}
.kick{font-family:var(--fm);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
h1{font-weight:300;font-size:clamp(28px,4.4vw,46px);letter-spacing:-.03em;margin:10px 0 6px;line-height:1.05}
h1 em{font-family:Lora,serif;font-style:italic;color:var(--accent)}
h2{font-family:var(--fm);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
   margin:56px 0 18px;padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.sub{color:var(--ink-soft);font-size:14.5px;max-width:62ch;line-height:1.6}
.sheet{background:var(--surface);border:1px solid var(--line);border-radius:3px;padding:26px 28px;margin-bottom:14px;position:relative}
.sheet::after{content:attr(data-code);position:absolute;right:14px;top:12px;font-family:var(--fm);font-size:9.5px;letter-spacing:.14em;color:var(--muted)}
.sheet h3{font-size:16px;font-weight:700;letter-spacing:-.01em}
.sheet p{font-size:12.5px;color:var(--ink-soft);margin:6px 0 18px;max-width:56ch;line-height:1.55}
.sw{display:flex;gap:8px;flex-wrap:wrap}
.s{width:92px}
.s i{display:block;height:52px;border-radius:2px;border:1px solid rgba(0,0,0,.07)}
.s b{display:block;font-size:10px;font-weight:600;margin-top:7px}
.s span{display:block;font-family:var(--fm);font-size:9.5px;color:var(--muted)}
.dots{display:flex;gap:30px;align-items:center;flex-wrap:wrap}
.dw{display:flex;flex-direction:column;align-items:center;gap:9px;font-size:10.5px;color:var(--muted)}
.d{width:15px;height:15px;border-radius:999px}
.rule{height:1px;background:var(--line);margin:0}
</style></head>
<body><div class="wrap">
<div class="kick">MateOS · Пульс #602 · design code v2</div>
<h1>Тёплая бумага <em>и чертёж</em></h1>
<p class="sub">Мудборд снял неоморфизм и вернул чертёжный минимализм: hairline, номера листов, размерные метки, один сигнальный акцент на очень светлом тёплом фоне.</p>
<h2><span>Палитры</span><span>01</span></h2>
<div id="pal"></div>
<h2><span>Индикатор · без подписей</span><span>02</span></h2>
<div id="st"></div>
<h2><span>Лента · окно 14 дней</span><span>03</span></h2>
<div class="sheet" data-code="TAPE / 14D"><div id="tape"></div></div>
<h2><span>Карточка треда</span><span>04</span></h2>
<div id="card"></div>
</div>
<script>
const P=[
{n:"W1 · FT Paper",cd:"PAL-01",d:"Розовато-кремовая бумага Financial Times. Самая тёплая и самая узнаваемая. Риск: на дешёвых матрицах уходит в розовый.",
 c:[["paper","#FFF1E5"],["surface","#FFF8F0"],["ink","#1A1815"],["ink-soft","#55504A"],["muted","#9B948A"],["line","#E8DCCD"],["accent","#E2552F"],["deep","#33302B"]],
 s:[["плохо","#E2552F"],["так себе","#C8912F"],["хорошо","#7C8F62"],["нет данных","#C9C2B6"]]},
{n:"W2 · Linen",cd:"PAL-02",d:"Тёпло-серый лён. Спокойнее FT, бежевее белого, не отдаёт в розовый. Мой выбор для интерфейса, в котором сидят часами.",
 c:[["paper","#F7F4ED"],["surface","#FCFAF5"],["ink","#1C1A17"],["ink-soft","#57534C"],["muted","#9A948A"],["line","#E3DED2"],["accent","#D9542F"],["deep","#2E2B27"]],
 s:[["плохо","#D9542F"],["так себе","#C08A2B"],["хорошо","#778C5C"],["нет данных","#C5BFB3"]]},
{n:"W3 · Draft",cd:"PAL-03",d:"Калька. Самый нейтральный из тёплых, ближе всего к чертёжному листу с последнего слайда мудборда.",
 c:[["paper","#F4F2EC"],["surface","#FAF9F5"],["ink","#16181A"],["ink-soft","#4E514F"],["muted","#969A97"],["line","#DEDBD2"],["accent","#E04A24"],["deep","#282A2B"]],
 s:[["плохо","#E04A24"],["так себе","#BE8B2E"],["хорошо","#6F8A63"],["нет данных","#C2C0B8"]]}];

document.getElementById("pal").innerHTML=P.map(p=>`<div class="sheet" data-code="${p.cd}"><h3>${p.n}</h3><p>${p.d}</p><div class="sw">${
 p.c.map(([k,v])=>`<div class="s"><i style="background:${v}"></i><b>${k}</b><span>${v}</span></div>`).join("")}</div></div>`).join("");
document.getElementById("st").innerHTML=P.map(p=>`<div class="sheet" data-code="${p.cd}"><h3>${p.n}</h3><div class="dots" style="margin-top:14px">${
 p.s.map(([k,v])=>`<div class="dw"><span class="d" style="background:${v}"></span>${k}</div>`).join("")}</div></div>`).join("");

const today=6,act=[0,2,0,1,3,0,2,1,0,0,2,1,0,1];
document.getElementById("tape").innerHTML=`<div style="display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);padding-bottom:10px">${
 act.map((a,i)=>{const on=i===today,h=[6,16,28,42][a];
 return `<div style="flex:0 0 64px;text-align:center;position:relative">
 <div style="font-family:var(--fm);font-size:9px;letter-spacing:.14em;color:var(--muted)">${["ПН","ВТ","СР","ЧТ","ПТ","СБ","ВС"][i%7]}</div>
 <div style="font-family:var(--fm);font-size:13px;font-weight:${on?500:400};margin:3px 0 10px;color:${on?"var(--ink)":"var(--ink-soft)"}">${13+i}</div>
 <div style="height:44px;display:flex;align-items:flex-end;justify-content:center">
  <div style="width:1px;height:${h}px;background:${a?"var(--accent)":"var(--line)"}"></div>
  ${a?`<div style="position:absolute;bottom:${h-3}px;width:5px;height:5px;border-radius:999px;background:var(--accent)"></div>`:""}
 </div>
 ${on?'<div style="position:absolute;left:50%;top:-6px;bottom:-11px;width:1px;background:var(--ink);opacity:.25"></div>':""}
 </div>`}).join("")}</div>
 <div style="display:flex;justify-content:space-between;font-family:var(--fm);font-size:9px;letter-spacing:.14em;color:var(--muted);margin-top:9px">
 <span>13 ИЮЛ</span><span>СПРИНТ 14 ДН · АКТИВНОСТЬ ПО ДНЯМ</span><span>26 ИЮЛ</span></div>`;

document.getElementById("card").innerHTML=`<div class="sheet" data-code="THR-014 / T3">
 <div style="display:flex;gap:14px;align-items:flex-start">
  <span class="d" style="background:var(--warn);margin-top:6px"></span>
  <div style="flex:1">
   <h3>Автосбор часов из 1С в бэклог</h3>
   <div style="font-family:var(--fm);font-size:9.5px;letter-spacing:.14em;color:var(--muted);margin-top:6px">ЭВРИКА · ОБНОВЛЕНО 3 ДНЯ НАЗАД</div>
  </div>
  <div style="text-align:right"><div style="font-family:var(--fm);font-size:26px;font-weight:500;color:var(--accent);line-height:1">66</div>
  <div style="font-family:var(--fm);font-size:9px;letter-spacing:.14em;color:var(--muted)">ЧАС/МЕС</div></div>
 </div>
 <div style="display:flex;gap:0;margin:22px 0 18px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)">
  ${["ЗАДАЧА","ИССЛЕД.","ПРОТОТИП","ТЕСТЫ","ТЗ"].map((s,i)=>`<div style="flex:1;padding:10px 0;font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-align:center;
   color:${i<2?"var(--ink)":i===2?"var(--accent)":"var(--muted)"};border-bottom:${i===2?"1px solid var(--accent)":"1px solid transparent"};margin-bottom:-1px">${s}</div>`).join("")}
 </div>
 <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:22px">
  ${[["ПРОБЛЕМА","Часы считают вручную, данные расходятся с 1С."],["НА ВЫХОДЕ","Ночная выгрузка в бэклог, сверка автоматом."],["НА ВХОДЕ","Доступ к API 1С и сопоставление номенклатуры."]]
   .map(([k,v])=>`<div><div style="font-family:var(--fm);font-size:9px;letter-spacing:.14em;color:var(--muted);padding-bottom:7px;border-bottom:1px solid var(--line)">${k}</div>
   <p style="margin-top:9px">${v}</p></div>`).join("")}
 </div></div>`;
</script></body></html>
