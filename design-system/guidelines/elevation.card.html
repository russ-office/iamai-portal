<!-- @dsCard group="Brand" viewport="700x170" name="Elevation — D1 Edge" subtitle="The only elevation level" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:24px;background:var(--paper);display:flex;gap:24px;align-items:center}
.card{width:220px;height:110px;background:var(--surface);border:1px solid var(--line);border-top:1px solid #fff;border-radius:4px;box-shadow:0 1px 2px rgba(120,105,85,.10);padding:14px}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.spec{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);line-height:1.7}
</style></head><body>
<div class="card"><div class="lbl">D1 · Edge</div><div style="margin-top:8px;font-size:14px;color:var(--ink)">The one surface</div></div>
<div class="spec">border: 1px var(--line)<br>border-top: 1px #fff<br>radius: 4px<br>shadow: 0 1px 2px rgba(120,105,85,.10)<br><span style="color:var(--accent)">no second level · no neumorphism</span></div>
</body></html>
