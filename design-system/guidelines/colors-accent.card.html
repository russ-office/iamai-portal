<!-- @dsCard group="Colors" viewport="700x150" name="Accent & line" subtitle="Single terracotta accent, hairline" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:20px;background:var(--paper);display:flex;gap:14px;align-items:center}
.big{width:120px;height:96px;border-radius:var(--radius);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;box-shadow:var(--shadow-d1)}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}.h{font-family:var(--font-mono);font-size:10px;opacity:.7}
.note{font-size:12px;color:var(--ink-soft);max-width:360px;line-height:1.5}
.line-sw{width:120px;height:96px;background:var(--surface);border:1px solid var(--line);border-top:1px solid #fff;border-radius:var(--radius);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
</style></head><body>
<div class="big" style="background:#D9542F;color:#fff"><span class="n">accent</span><span class="h">#D9542F</span></div>
<div class="line-sw"><span class="n" style="color:#1C1A17">line</span><span class="h" style="color:#57534C">#E3DED2</span></div>
<div class="note">One terracotta, used <b>sparingly</b>: primary action, active state, and <code style="font-family:var(--font-mono)">bad</code> status. Never a large fill. Structure comes from 1px hairlines, not colour.</div>
</body></html>
