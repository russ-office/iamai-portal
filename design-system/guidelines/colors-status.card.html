<!-- @dsCard group="Colors" viewport="700x150" name="Status — 4 values" subtitle="Indicator colours only" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:24px;background:var(--paper);display:flex;gap:36px;align-items:center}
.s{display:flex;flex-direction:column;align-items:center;gap:10px}
.dot{width:14px;height:14px;border-radius:50%}
.n{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft)}.h{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
</style></head><body>
<div class="s"><span class="dot" style="background:#D9542F"></span><span class="n">bad</span><span class="h">#D9542F</span></div>
<div class="s"><span class="dot" style="background:#C08A2B"></span><span class="n">warn</span><span class="h">#C08A2B</span></div>
<div class="s"><span class="dot" style="background:#778C5C"></span><span class="n">ok</span><span class="h">#778C5C</span></div>
<div class="s"><span class="dot" style="background:#C5BFB3"></span><span class="n">none</span><span class="h">#C5BFB3</span></div>
<div style="font-size:12px;color:var(--muted);max-width:220px;line-height:1.5">14px circle, colour only. No captions, no shape variants. <code style="font-family:var(--font-mono)">aria-label</code> always present.</div>
</body></html>
