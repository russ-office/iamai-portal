<!-- @dsCard group="Colors" viewport="700x150" name="Base — Linen" subtitle="Warm paper base, warm ink" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:20px;background:var(--paper)}
.row{display:flex;gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-d1)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}
.h{font-family:var(--font-mono);font-size:10px;opacity:.7}
</style></head><body>
<div class="row">
<div class="sw" style="background:#F7F4ED;color:#1C1A17"><span class="n">paper</span><span class="h">#F7F4ED</span></div>
<div class="sw" style="background:#FCFAF5;color:#1C1A17"><span class="n">surface</span><span class="h">#FCFAF5</span></div>
<div class="sw" style="background:#1C1A17;color:#F2EDE2"><span class="n">ink</span><span class="h">#1C1A17</span></div>
<div class="sw" style="background:#57534C;color:#F2EDE2"><span class="n">ink-soft</span><span class="h">#57534C</span></div>
<div class="sw" style="background:#9A948A;color:#1C1A17"><span class="n">muted</span><span class="h">#9A948A</span></div>
<div class="sw" style="background:#2E2B27;color:#F2EDE2"><span class="n">deep</span><span class="h">#2E2B27</span></div>
</div>
</body></html>
