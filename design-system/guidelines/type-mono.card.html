<!-- @dsCard group="Type" viewport="700x150" name="JetBrains Mono — labels" subtitle="Labels, codes, numbers" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:22px 24px;background:var(--paper);color:var(--ink)}
.r{display:flex;align-items:baseline;gap:14px;margin-bottom:8px;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.tag{font-family:var(--font-mono);font-size:10px;color:var(--muted);width:96px;flex:none}
.lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
</style></head><body>
<div class="r"><span class="tag">Micro label</span><span class="lbl">Sprint 24 · Day 6</span></div>
<div class="r"><span class="tag">Code</span><span style="font-size:14px;color:var(--ink)">PR-4821</span></div>
<div class="r"><span class="tag">Number</span><span style="font-size:14px;color:var(--ink)">62% · 14d · 4 open</span></div>
<div class="r"><span class="tag">Tabular</span><span style="font-size:14px;color:var(--ink-soft)">0123456789</span></div>
</body></html>
