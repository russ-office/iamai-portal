# MateOS Lab — snapshot бэклога по группам (M-033).
# Каждые 15 мин в рабочее окно Алматы (09:00–21:00 = UTC 04–16).
# AIRTABLE_PAT живёт ТОЛЬКО в Infisical, тянется на рантайме machine identity.
name: lab-snapshot

on:
  schedule:
    - cron: "*/15 4-16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lab-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG || 'prod' }}
          export-type: env
          secret-path: "/"

      - name: Run lab snapshot
        env:
          LAB_PREFILL: ${{ vars.LAB_PREFILL || '0' }}
        run: python3 scripts/lab_snapshot.py

      # Пульс участников. LAB_PREFILL обязана быть и здесь: прогон без переменной
      # молча пишет ссылки БЕЗ p_* и затирает уже хорошие (грабля M-034).
      - name: Run pulse snapshot
        env:
          LAB_PREFILL: ${{ vars.LAB_PREFILL || '0' }}
        run: python3 scripts/pulse_snapshot.py

      - name: Commit snapshots
        run: |
          git config user.name "iamai-dash-bot"
          git config user.email "actions@users.noreply.github.com"
          git add lab/data/*.json pulse/data/*.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "lab snapshot: $(TZ=Asia/Almaty date '+%Y-%m-%d %H:%M') Almaty"
            git push
          fi
