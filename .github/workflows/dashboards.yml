# IAMAI client dashboards — scheduled snapshot job.
# Almaty (UTC+5) 09:00–21:00 every 2h => UTC 04,06,08,10,12,14,16.
# Secrets: AIRTABLE_PAT lives ONLY in Infisical; this job pulls it at runtime
# via a machine identity. GitHub stores only the Infisical credentials.
name: dashboards-snapshot

on:
  schedule:
    - cron: "0 4,6,8,10,12,14,16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dashboards-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull AIRTABLE_PAT from Infisical into env (machine identity / universal auth).
      # NOTE: verify project-slug / env-slug / secret path against the Infisical project.
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG || 'prod' }}
          export-type: env
          secret-path: "/"

      - name: Run snapshots
        run: python3 scripts/snapshot.py

      - name: Commit snapshots
        run: |
          git config user.name "iamai-dash-bot"
          git config user.email "actions@users.noreply.github.com"
          git add d/*/data/*.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "snapshot: $(TZ=Asia/Almaty date '+%Y-%m-%d %H:%M') Almaty"
            git push
          fi
